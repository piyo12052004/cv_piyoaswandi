                    <button
                        type="button"
                        x-show="search.length > 0"
                        @click="search = ''"
                        class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-700">
                        <i class="fa-solid fa-xmark"></i>
                    </button>
                </div>

                <!-- Filters -->
                <div class="flex flex-wrap gap-3 items-center">

                    <!-- Category filter -->
                    <div class="flex bg-gray-100 rounded-full p-1 text-sm">
                        <template x-for="opt in categoryOptions" :key="opt.value">
                            <button
                                type="button"
                                @click="category = opt.value"
                                class="px-4 py-1.5 rounded-full font-semibold transition"
                                :class="category === opt.value ? 'bg-gray-900 text-white shadow' : 'text-gray-600 hover:text-gray-900'"
                                x-text="opt.label + ' (' + opt.count + ')'">
                            </button>
                        </template>

                        <template x-for="t in techOptions" :key="t">
                            <option :value="t" x-text="t"></option>
                        </template>
                    </select> -->

                        type="button"
                        @click="sortAsc = !sortAsc"

                        <span x-text="sortAsc ? 'Terlama' : 'Terbaru'"></span>

                get techOptions() {
                    const set = new Set();
                    this.items.forEach(i => i.tech.forEach(t => set.add(t)));
                    return Array.from(set).sort();
                },

                matchesSearch(item) {
                    if (!this.search.trim()) return true;
                    const q = this.search.trim().toLowerCase();
                    const haystack = [item.title, item.description, item.badge, item.subtitle, ...item.tech].join(' ').toLowerCase();
                    return haystack.includes(q);
                },
                matchesCategory(item) {
                    return this.category === 'all' || item.category === this.category;
                },
                matchesTech(item) {
                    return this.tech === 'all' || item.tech.includes(this.tech);
                },

                get filteredItems() {
                    const list = this.items.filter(i => this.matchesSearch(i) && this.matchesCategory(i) && this.matchesTech(i));
                    return list.sort((a, b) => {
                        const diff = (a.year * 12 + a.month) - (b.year * 12 + b.month);
                        return this.sortAsc ? diff : -diff;
                    });
                },
                get groupedDocs() {
                    return this.filteredItems.filter(i => i.category === 'documentation');
                },
                get groupedProjects() {
                    return this.filteredItems.filter(i => i.category === 'project');
                },
                get resultSummary() {
                    const total = this.filteredItems.length;
                    return total + ' hasil ditemukan \u00b7 diurutkan berdasarkan tahun (' + (this.sortAsc ? 'terlama ke terbaru' : 'terbaru ke terlama') + ')';
                },

                init() {
                    this.$watch('items', () => {});
                    this.categoryOptions[0].count = this.items.length;
                    this.categoryOptions[1].count = this.items.filter(i => i.category === 'documentation').length;
                    this.categoryOptions[2].count = this.items.filter(i => i.category === 'project').length;
                }
            }
        }
    </script>

</body>
